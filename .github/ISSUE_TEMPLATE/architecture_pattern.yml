name: "Architecture Pattern"
description: "Submit a new architecture pattern or landing zone archetype"
title: "[Pattern]: "
labels: ["type:feature", "area:fullstack", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a new landing zone architecture pattern for OnRamp.

  - type: input
    id: pattern-name
    attributes:
      label: Pattern Name
      description: A concise name for this architecture pattern.
      placeholder: "e.g., Healthcare Regulated Landing Zone"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is this pattern for? What type of organization or workload does it target?
    validations:
      required: true

  - type: dropdown
    id: org-size
    attributes:
      label: Target Organization Size
      options:
        - Small (1-100 employees)
        - Medium (100-1000 employees)
        - Large (1000-10000 employees)
        - Enterprise (10000+ employees)
    validations:
      required: true

  - type: textarea
    id: azure-services
    attributes:
      label: Azure Services Used
      description: List the key Azure services this pattern deploys or configures.
      placeholder: |
        - Azure Firewall
        - Azure Policy
        - Microsoft Defender for Cloud
    validations:
      required: true

  - type: checkboxes
    id: compliance
    attributes:
      label: Compliance Frameworks
      description: Which compliance frameworks does this pattern address?
      options:
        - label: SOC 2
        - label: HIPAA
        - label: PCI-DSS
        - label: FedRAMP
        - label: NIST 800-53
        - label: ISO 27001

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any diagrams, references, or implementation notes?
    validations:
      required: false
