name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/CLI@v2
        with:
          inlineScript: |
            az deployment sub create \
              --location eastus2 \
              --template-file infra/main.bicep \
              --parameters infra/parameters/${{ inputs.environment }}.bicepparam \
              --parameters sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}

  build-and-push:
    name: Build & Push Containers
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: ${{ inputs.environment }}
    strategy:
      matrix:
        include:
          - app: frontend
            context: frontend
          - app: backend
            context: backend
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp up \
              --name ca-onramp-${{ matrix.app }}-${{ inputs.environment }} \
              --resource-group rg-onramp-${{ inputs.environment }} \
              --source ${{ matrix.context }}
