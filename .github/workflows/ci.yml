name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build

  backend:
    name: Backend Test, Lint & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check app/
      - run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=75

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies and pip-audit
        run: |
          pip install -e ".[dev]"
          pip install pip-audit
        working-directory: backend
      - name: Run pip audit
        run: pip-audit
        working-directory: backend

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: frontend

  infra:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/CLI@v2
        with:
          inlineScript: |
            az bicep build --file infra/main.bicep
