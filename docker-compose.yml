version: "3.9"

services:
  # Microsoft SQL Server 2022 for local development
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: onramp-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "OnRamp_Dev_P@ss1"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "OnRamp_Dev_P@ss1" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onramp-backend
    environment:
      ONRAMP_DATABASE_URL: "mssql+pyodbc://sa:OnRamp_Dev_P@ss1@db:1433/onramp?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
      ONRAMP_CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
      ONRAMP_AZURE_TENANT_ID: ""
      ONRAMP_AZURE_CLIENT_ID: ""
      ONRAMP_AI_FOUNDRY_ENDPOINT: ""
      ONRAMP_AI_FOUNDRY_KEY: ""
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # React frontend (dev server with hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
    container_name: onramp-frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro

volumes:
  sqldata:
    driver: local
