services:
  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onramp-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      ONRAMP_DATABASE_URL: "${ONRAMP_DATABASE_URL:-}"
      ONRAMP_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://172.19.197.177:5173"]'
      ONRAMP_AZURE_TENANT_ID: ""
      ONRAMP_AZURE_CLIENT_ID: ""
      ONRAMP_AI_FOUNDRY_ENDPOINT: ""
      ONRAMP_AI_FOUNDRY_KEY: ""
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # React frontend (Vite dev server with HMR)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
    container_name: onramp-frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Microsoft SQL Server 2022
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: onramp-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqldata:
    driver: local
